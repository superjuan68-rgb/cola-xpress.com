<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Video Watermark — Cola-Xpress</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 150px;
    height: 150px;
    overflow: hidden;
    background: transparent;
  }

  /* Transparent canvas — watermark floats over video content */
  .canvas {
    position: relative;
    width: 150px;
    height: 150px;
    overflow: hidden;
    background: transparent;
  }

  /* Very subtle dark backing to improve legibility over light video frames */
  .backing {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 90% 90% at 50% 50%,
      rgba(0, 0, 0, 0.22) 0%,
      transparent 72%
    );
    pointer-events: none;
  }

  /* Monogram — white on transparent, legible over any video */
  .monogram-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mono-inner {
    position: relative;
    display: flex;
    align-items: baseline;
    margin-top: -4px;
  }

  .letter-c {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 76px;
    font-weight: 700;
    color: rgba(232, 228, 221, 0.92); /* #e8e4dd at 92% — slightly soft */
    line-height: 1;
    letter-spacing: -0.03em;
    position: relative;
    z-index: 2;
  }

  .letter-x {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 76px;
    font-weight: 700;
    color: rgba(56, 180, 200, 0.88); /* #38b4c8 slightly soft */
    line-height: 1;
    letter-spacing: -0.03em;
    margin-left: -6px;
    position: relative;
    z-index: 1;
  }

</style>
</head>
<body>
<div class="canvas">
  <div class="backing"></div>
  <div class="monogram-wrap">
    <div class="mono-inner">
      <span class="letter-c">C</span>
      <span class="letter-x">X</span>
    </div>
  </div>
</div>
</body>
</html>
