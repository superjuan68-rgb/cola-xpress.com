<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,600&family=Manrope:wght@800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1920px;height:1080px;overflow:hidden;background:#000}
.canvas{position:relative;width:1920px;height:1080px;background:#020304;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column}
.act-num{font-family:'Manrope',sans-serif;font-size:11px;font-weight:800;letter-spacing:0.45em;text-transform:uppercase;color:rgba(159,48,40,0.7);margin-bottom:20px;position:relative;z-index:2}
.rule-top{width:40px;height:1px;background:rgba(159,48,40,0.4);margin-bottom:20px;position:relative;z-index:2}
.act-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:130px;font-weight:700;color:rgba(232,228,221,0.9);letter-spacing:0.04em;line-height:1;text-align:center;position:relative;z-index:2;text-transform:uppercase}
.act-sub{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;font-style:italic;color:rgba(56,180,200,0.45);margin-top:18px;position:relative;z-index:2;letter-spacing:0.06em}
.timecode{font-family:'Manrope',sans-serif;font-size:11px;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,0.12);margin-top:30px;position:relative;z-index:2}
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 22%,rgba(0,0,0,0.88) 100%)}
</style></head>
<body><div class="canvas">
<div class="act-num">Act III</div>
<div class="rule-top"></div>
<div class="act-title">The Reveal</div>
<div class="act-sub">the door opened</div>
<div class="timecode">6:30 — 10:30</div>
<div class="vignette"></div>
</div></body></html>
