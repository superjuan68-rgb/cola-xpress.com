<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,600&family=Manrope:wght@800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1920px;height:1080px;overflow:hidden;background:#000}
.canvas{position:relative;width:1920px;height:1080px;background:#020304;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0}
/* Subtle teal atmosphere */
.glow{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:1200px;height:700px;background:radial-gradient(ellipse at 50% 50%,rgba(56,180,200,0.06) 0%,transparent 62%)}
.pre-label{font-family:'Manrope',sans-serif;font-size:11px;font-weight:800;letter-spacing:0.45em;text-transform:uppercase;color:rgba(56,180,200,0.45);margin-bottom:28px;position:relative;z-index:2}
.title-line{font-family:'Cormorant Garamond',Georgia,serif;font-weight:700;color:rgba(232,228,221,0.92);letter-spacing:-0.01em;line-height:1.05;text-align:center;position:relative;z-index:2}
.line1{font-size:100px}
.line2{font-size:100px}
.line3{font-size:100px;color:rgba(56,180,200,0.85)}
.rule{width:56px;height:1px;background:rgba(56,180,200,0.35);margin:28px auto 24px;position:relative;z-index:2}
.sub{font-family:'Manrope',sans-serif;font-size:14px;font-weight:800;letter-spacing:0.28em;text-transform:uppercase;color:rgba(255,255,255,0.2);position:relative;z-index:2}
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse 85% 82% at 50% 50%,transparent 20%,rgba(0,0,0,0.88) 100%)}
</style></head>
<body><div class="canvas">
<div class="glow"></div>
<div class="pre-label">Cola-Xpress · The Grow Series · Episode 01</div>
<div class="title-line line1">The End of</div>
<div class="title-line line2">Complicated</div>
<div class="title-line line3">Cannabis Growing</div>
<div class="rule"></div>
<div class="sub">vGrow · DWC · Seed to Jar · 60 Days</div>
<div class="vignette"></div>
</div></body></html>
