<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1920px;height:1080px;overflow:hidden;background:#000}
.canvas{position:relative;width:1920px;height:1080px;background:#020304;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column}
.glow{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:700px;height:600px;background:radial-gradient(ellipse at 50% 50%,rgba(56,200,80,0.05) 0%,rgba(56,180,200,0.04) 40%,transparent 65%)}
.label{font-family:'Manrope',sans-serif;font-size:16px;font-weight:800;letter-spacing:0.38em;text-transform:uppercase;color:rgba(56,180,200,0.55);margin-bottom:16px;position:relative;z-index:2}
.number{font-family:'Cormorant Garamond',Georgia,serif;font-size:240px;font-weight:700;color:rgba(232,228,221,0.92);letter-spacing:-0.04em;line-height:0.9;text-align:center;position:relative;z-index:2}
.rule{width:60px;height:1px;background:rgba(56,180,200,0.35);margin-top:24px;position:relative;z-index:2}
.date-label{font-family:'Manrope',sans-serif;font-size:13px;font-weight:800;letter-spacing:0.22em;color:rgba(56,200,80,0.5);margin-top:16px;text-transform:uppercase;position:relative;z-index:2}
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse 75% 75% at 50% 50%,transparent 25%,rgba(0,0,0,0.88) 100%)}
</style></head>
<body><div class="canvas">
<div class="glow"></div>
<div class="label">Day</div>
<div class="number">28</div>
<div class="rule"></div>
<div class="date-label">Root mass mature · Never stressed · Ready</div>
<div class="vignette"></div>
</div></body></html>
