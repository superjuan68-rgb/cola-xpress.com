<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1920px;height:1080px;overflow:hidden;background:#000}
.canvas{position:relative;width:1920px;height:1080px;background:#020304;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column}
.glow{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:800px;height:600px;background:radial-gradient(ellipse at 50% 50%,rgba(56,180,200,0.05) 0%,transparent 65%)}
.text{font-family:'Cormorant Garamond',Georgia,serif;font-size:140px;font-weight:700;color:rgba(232,228,221,0.92);letter-spacing:-0.02em;line-height:1;text-align:center;position:relative;z-index:2}
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 30%,rgba(0,0,0,0.88) 100%)}
</style></head>
<body><div class="canvas">
<div class="glow"></div>
<div class="text">I slept.</div>
<div class="vignette"></div>
</div></body></html>
