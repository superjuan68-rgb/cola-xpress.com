# =============================================================================
# CANONICAL ENFORCEMENT - NEW DOMAIN (NGINX)
# Deploy at: /etc/nginx/sites-available/cola-xpress.com
# =============================================================================

# 1. Redirect non-www -> www (HTTP and HTTPS)
server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name cola-xpress.com;

    # ssl_certificate     /etc/letsencrypt/live/cola-xpress.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cola-xpress.com/privkey.pem;

    return 301 https://www.cola-xpress.com$request_uri;
}

# 2. Redirect HTTP -> HTTPS on www
server {
    listen 80;
    listen [::]:80;
    server_name www.cola-xpress.com;
    return 301 https://www.cola-xpress.com$request_uri;
}

# 3. Canonical: https://www.cola-xpress.com
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.cola-xpress.com;

    # ssl_certificate     /etc/letsencrypt/live/cola-xpress.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cola-xpress.com/privkey.pem;

    root /var/www/cola-xpress.com/public_html;
    index index.html index.php;

    # Strip /index.html and /index.php from URLs
    if ($request_uri ~ ^/(.*)/index\.(html?|php)$) {
        return 301 /$1;
    }

    # Security + canonical headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # Static asset caching (image SEO + Core Web Vitals)
    location ~* \.(jpe?g|png|webp|avif|svg|gif|ico|woff2?|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Reject access to dotfiles
    location ~ /\.(?!well-known).* { deny all; }
}
