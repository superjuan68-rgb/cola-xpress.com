# =============================================================================
# 301 MIGRATION - OLD DOMAIN (NGINX)
# Deploy at: /etc/nginx/sites-available/colaxpress.cannahustle.nyc
#
# - Path-preserving 301 to https://www.cola-xpress.com
# - Per-URL overrides go in the `map` block below; the catch-all handles the rest
# =============================================================================

# Per-URL overrides for slugs that CHANGED during migration.
# Add entries as:   "/old/path"  "/new/path";
# The default value (an empty string) tells the server: "no override, use 1:1".
map $request_uri $migration_override {
    default                                "";

    # "/old-product-name"                  "/new-product-name";
    # "/blog/old-post-slug"                "/blog/new-post-slug";
    # "/category/legacy-cat"               "/shop/category-cat";
}

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name colaxpress.cannahustle.nyc www.colaxpress.cannahustle.nyc;

    # SSL cert paths (Let's Encrypt / your provider)
    # ssl_certificate     /etc/letsencrypt/live/colaxpress.cannahustle.nyc/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/colaxpress.cannahustle.nyc/privkey.pem;

    # 1. If an override exists, use it
    if ($migration_override != "") {
        return 301 https://www.cola-xpress.com$migration_override;
    }

    # 2. Otherwise, 1:1 path-preserving redirect (preserves query string via $request_uri)
    return 301 https://www.cola-xpress.com$request_uri;
}
